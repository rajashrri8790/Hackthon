<div class="card shadow p-5">

  <h2 class="text-success mb-4 text-center">
    Payment Page
  </h2>

  <div class="row">

    <!-- CARD PAYMENT -->
    <div class="col-md-6">

      <h4 class="mb-3">
        Card Payment
      </h4>

      <div class="mb-3">
        <label>Card Holder Name</label>
        <input type="text" class="form-control">
      </div>

      <div class="mb-3">
        <label>Card Number</label>
        <input type="text" class="form-control">
      </div>

      <div class="row">

        <div class="col-md-6">
          <label>Expiry Date</label>
          <input type="text" class="form-control">
        </div>

        <div class="col-md-6">
          <label>CVV</label>
          <input type="password" class="form-control">
        </div>

      </div>

    </div>

    <!-- PHONEPE PAYMENT -->
    <div class="col-md-6 text-center">

      <h4 class="mb-3">
        PhonePe Payment
      </h4>

      <img
        src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=PhonePePayment"
        class="img-fluid border rounded shadow"
      >

      <p class="mt-3 text-muted">
        Scan QR using PhonePe / GPay / Paytm
      </p>

    </div>

  </div>

  <div class="text-center">

    <a
      routerLink="/success"
      class="btn btn-primary btn-lg mt-5 px-5"
    >
      Pay Now
    </a>

  </div>

</div>
